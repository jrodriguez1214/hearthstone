<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hearthstone">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8B5E3C">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Hearthstone — Property Manager</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="app-shell">
  <!-- Top bar — always visible -->
  <header class="top-bar">
    <div class="top-bar-left">
      <button class="top-bar-back hidden" id="back-btn" onclick="Router.go('dashboard')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="top-bar-brand" onclick="Router.go('dashboard')" style="cursor:pointer">
        <div class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 512 512">
            <rect x="108" y="230" width="296" height="210" rx="12" fill="none" stroke="white" stroke-width="36" stroke-linejoin="round"/>
            <polyline points="76,248 256,108 436,248" fill="none" stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M256,358 C256,358 188,306 188,274 C188,254 204,240 224,240 C238,240 250,248 256,258 C262,248 274,240 288,240 C308,240 324,254 324,274 C324,306 256,358 256,358Z" fill="rgba(255,255,255,0.7)"/>
          </svg>
        </div>
        <span class="top-bar-title" id="top-bar-title">Hearthstone</span>
      </div>
    </div>
    <div class="top-bar-right">
      <button class="top-bar-btn" onclick="Search.open()" aria-label="Search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <kbd class="top-bar-kbd" onclick="Search.open()">⌘K</kbd>
    </div>
  </header>

  <!-- Main content -->
  <div class="content-area">
    <div id="page-root"></div>
  </div>
</div>

<!-- Global Search Overlay -->
<div id="search-overlay" class="search-overlay hidden">
  <div class="search-backdrop" onclick="Search.close()"></div>
  <div class="search-dialog">
    <div class="search-input-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search properties, tenants, payments…" autocomplete="off" spellcheck="false">
      <kbd class="search-esc">esc</kbd>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>
</div>

<!-- Slide-in Panel (replaces modal for forms/details) -->
<div id="panel-overlay" class="panel-overlay hidden">
  <div class="panel-backdrop" onclick="Panel.close()"></div>
  <div class="panel-drawer" id="panel-drawer">
    <div class="panel-drawer-head">
      <h3 id="panel-title"></h3>
      <button class="panel-drawer-close" onclick="Panel.close()">&#x2715;</button>
    </div>
    <div class="panel-drawer-body" id="panel-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
